name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release version to (re)publish to the Homebrew tap (e.g. v0.1.1). Skips build; reuses DMGs already attached to that GitHub Release.'
        required: true
        type: string

permissions:
  contents: write

env:
  # For tag pushes, use the tag name (relay releases with matching version).
  # For manual workflow_dispatch runs, fall back to 'latest'.
  # The preflight job validates this release exists before platform builds start.
  RELAY_VERSION: ${{ github.ref_name && startsWith(github.ref_name, 'v') && github.ref_name || 'latest' }}

jobs:
  preflight:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      relay_version: ${{ steps.check.outputs.relay_version }}
    steps:
      - name: Validate relay release exists
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" == v* ]]; then
            RELAY_VERSION="$REF_NAME"
          else
            RELAY_VERSION="latest"
          fi
          echo "relay_version=$RELAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "Checking for relay release: $RELAY_VERSION"
          if [[ "$RELAY_VERSION" == "latest" ]]; then
            gh release view --repo endara-ai/endara-relay --json tagName -q .tagName
          else
            gh release view "$RELAY_VERSION" --repo endara-ai/endara-relay --json tagName -q .tagName
          fi
          if [[ $? -ne 0 ]]; then
            echo "::error::Relay release '$RELAY_VERSION' not found in endara-ai/endara-relay. Release the relay first!"
            exit 1
          fi

  publish:
    needs: [preflight]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: x86_64-apple-darwin
            relay_target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
            relay_target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            relay_target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            relay_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05-08
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: './src-tauri -> target'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Download relay binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELAY_TARGET: ${{ matrix.relay_target }}
        run: |
          mkdir -p src-tauri/binaries
          RELAY_BINARY="endara-relay-${RELAY_TARGET}"
          if [[ "$RELAY_TARGET" == *"windows"* ]]; then
            RELAY_BINARY="${RELAY_BINARY}.exe"
          fi
          if [[ "$RELAY_VERSION" == "latest" ]]; then
            gh release download --repo endara-ai/endara-relay --pattern "$RELAY_BINARY" --dir src-tauri/binaries
          else
            gh release download "$RELAY_VERSION" --repo endara-ai/endara-relay --pattern "$RELAY_BINARY" --dir src-tauri/binaries
          fi
          chmod +x "src-tauri/binaries/$RELAY_BINARY" 2>/dev/null || true

      # Patch tauri.conf.json version from git tag (e.g., v0.1.0-rc8 → 0.1.0-rc8)
      # This ensures the built app reports the correct version for the updater
      - name: Patch tauri.conf.json version (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BUILD_VER=${GITHUB_REF_NAME#v}
          jq --arg v "$BUILD_VER" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Patched tauri.conf.json version to: $BUILD_VER"

      - name: Patch tauri.conf.json version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $json.version = $ver
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          Write-Output "Patched tauri.conf.json version to: $ver"

      # Set build args: skip MSI for RC builds on Windows (only produce NSIS)
      - name: Set build args
        id: build-args
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ARGS="--target ${TARGET}"
          if [[ "$PLATFORM" == "windows-latest" ]] && [[ "$REF_NAME" == *"rc"* ]]; then
            ARGS="$ARGS --bundles nsis"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build info for About section — picked up by build.rs
          DESKTOP_COMMIT: ${{ github.sha }}
          BUILD_VERSION: ${{ github.ref_name }}
          # Required for updater — generate with: npx @tauri-apps/cli signer generate
          # Store the private key as a GitHub secret named TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Endara Desktop ${{ github.ref_name }}'
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'rc') }}
          args: ${{ steps.build-args.outputs.args }}
          tauriScript: npx tauri

  # Publish latest.json to gh-pages for the auto-updater
  # This provides a stable URL: https://endara-ai.github.io/endara-desktop/latest.json
  publish-update-manifest:
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.event_name == 'push' && always() && !cancelled() && needs.publish.result == 'success'
    steps:
      - uses: actions/checkout@v4

      # Wait briefly for GitHub to finalize release assets
      - name: Wait for release assets to finalize
        run: sleep 30

      - name: Download latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p gh-pages-deploy
          gh release download "$REF_NAME" --pattern "latest.json" --dir gh-pages-deploy

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          # Keep existing files on gh-pages (in case we add more assets later)
          keep_files: true

  update-homebrew-tap:
    needs: [publish]
    # Only run on stable tag pushes (skip -rc.* prereleases) or manual workflow_dispatch.
    if: |
      always() &&
      (
        (github.event_name == 'push' && needs.publish.result == 'success' && !contains(github.ref_name, '-rc.')) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="${INPUT_VERSION}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$tag" ]]; then
            echo "Could not resolve a version/tag." >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Download DMGs from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p dmgs
          for arch in aarch64 x64; do
            asset="Endara.Desktop_${VERSION}_${arch}.dmg"
            echo "Downloading ${asset} from release ${TAG}..."
            gh release download "${TAG}" \
              --repo "${REPO}" \
              --pattern "${asset}" \
              --dir dmgs
          done
      - name: Compute SHA256 sums
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sha_arm64=$(shasum -a 256 "dmgs/Endara.Desktop_${VERSION}_aarch64.dmg" | awk '{print $1}')
          sha_x64=$(shasum -a 256 "dmgs/Endara.Desktop_${VERSION}_x64.dmg" | awk '{print $1}')
          {
            echo "arm64=${sha_arm64}"
            echo "x64=${sha_x64}"
          } >> "$GITHUB_OUTPUT"
      - name: Checkout endara-desktop (for update-cask.py)
        uses: actions/checkout@v4
        with:
          path: desktop
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: endara-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Update cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_ARM64: ${{ steps.sha.outputs.arm64 }}
          SHA_X64: ${{ steps.sha.outputs.x64 }}
        run: |
          mkdir -p homebrew-tap/Casks
          python3 desktop/scripts/update-cask.py \
            --version "${VERSION}" \
            --sha256-arm64 "${SHA_ARM64}" \
            --sha256-x64 "${SHA_X64}" \
            --cask-path homebrew-tap/Casks/endara.rb
      - name: Commit and push to homebrew-tap
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "endara-bot"
          git config user.email "endara-bot@users.noreply.github.com"
          git add Casks/endara.rb
          if git diff --cached --quiet; then
            echo "No cask changes to commit."
            exit 0
          fi
          git commit -m "chore: bump endara to ${VERSION}"
          git push origin HEAD:main
