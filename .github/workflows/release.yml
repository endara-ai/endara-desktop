name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # For tag pushes, use the tag name (relay releases with matching version).
  # For manual workflow_dispatch runs, fall back to 'latest'.
  # The preflight job validates this release exists before platform builds start.
  RELAY_VERSION: ${{ github.ref_name && startsWith(github.ref_name, 'v') && github.ref_name || 'latest' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      relay_version: ${{ steps.check.outputs.relay_version }}
    steps:
      - name: Validate relay release exists
        id: check
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == v* ]]; then
            RELAY_VERSION="${{ github.ref_name }}"
          else
            RELAY_VERSION="latest"
          fi
          echo "relay_version=$RELAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "Checking for relay release: $RELAY_VERSION"
          if [[ "$RELAY_VERSION" == "latest" ]]; then
            gh release view --repo endara-ai/endara-relay --json tagName -q .tagName
          else
            gh release view "$RELAY_VERSION" --repo endara-ai/endara-relay --json tagName -q .tagName
          fi
          if [[ $? -ne 0 ]]; then
            echo "::error::Relay release '$RELAY_VERSION' not found in endara-ai/endara-relay. Release the relay first!"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: x86_64-apple-darwin
            relay_target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
            relay_target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            relay_target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            relay_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Download relay binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          RELAY_BINARY="endara-relay-${{ matrix.relay_target }}"
          if [[ "${{ matrix.relay_target }}" == *"windows"* ]]; then
            RELAY_BINARY="${RELAY_BINARY}.exe"
          fi
          if [[ "$RELAY_VERSION" == "latest" ]]; then
            gh release download --repo endara-ai/endara-relay --pattern "$RELAY_BINARY" --dir src-tauri/binaries
          else
            gh release download "$RELAY_VERSION" --repo endara-ai/endara-relay --pattern "$RELAY_BINARY" --dir src-tauri/binaries
          fi
          chmod +x "src-tauri/binaries/$RELAY_BINARY" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Patch tauri.conf.json version from git tag (e.g., v0.1.0-rc8 → 0.1.0-rc8)
      # This ensures the built app reports the correct version for the updater
      - name: Patch tauri.conf.json version (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BUILD_VER=${GITHUB_REF_NAME#v}
          jq --arg v "$BUILD_VER" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Patched tauri.conf.json version to: $BUILD_VER"

      - name: Patch tauri.conf.json version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $json.version = $ver
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          Write-Output "Patched tauri.conf.json version to: $ver"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build info for About section — picked up by build.rs
          DESKTOP_COMMIT: ${{ github.sha }}
          BUILD_VERSION: ${{ github.ref_name }}
          # Required for updater — generate with: npx @tauri-apps/cli signer generate
          # Store the private key as a GitHub secret named TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Endara Desktop ${{ github.ref_name }}'
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'rc') }}
          args: --target ${{ matrix.target }}
          tauriScript: npx tauri

  # Publish latest.json to gh-pages for the auto-updater
  # This provides a stable URL: https://endara-ai.github.io/endara-desktop/latest.json
  publish-update-manifest:
    runs-on: ubuntu-latest
    needs: [publish]
    steps:
      - uses: actions/checkout@v4

      # Wait briefly for GitHub to finalize release assets
      - name: Wait for release assets to finalize
        run: sleep 30

      - name: Download latest.json from release
        run: |
          mkdir -p gh-pages-deploy
          gh release download "${{ github.ref_name }}" --pattern "latest.json" --dir gh-pages-deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          # Keep existing files on gh-pages (in case we add more assets later)
          keep_files: true
