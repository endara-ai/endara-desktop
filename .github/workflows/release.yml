name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      relay_version:
        description: 'Relay version to bundle (e.g. v0.1.0, or "latest")'
        required: false
        default: 'latest'

permissions:
  contents: write

env:
  RELAY_VERSION: ${{ inputs.relay_version || 'latest' }}

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: x86_64-apple-darwin
            relay_target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
            relay_target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            relay_target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            relay_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Download relay binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          RELAY_BINARY="endara-relay-${{ matrix.relay_target }}"
          if [[ "${{ matrix.relay_target }}" == *"windows"* ]]; then
            RELAY_BINARY="${RELAY_BINARY}.exe"
          fi
          if [[ "$RELAY_VERSION" == "latest" ]]; then
            gh release download --repo endara-ai/endara-relay --pattern "$RELAY_BINARY" --dir src-tauri/binaries
          else
            gh release download "$RELAY_VERSION" --repo endara-ai/endara-relay --pattern "$RELAY_BINARY" --dir src-tauri/binaries
          fi
          chmod +x "src-tauri/binaries/$RELAY_BINARY" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required for updater — generate with: npx @tauri-apps/cli signer generate
          # Store the private key as a GitHub secret named TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Endara Desktop v__VERSION__'
          releaseBody: 'See the assets to download and install.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          tauriScript: npx tauri
