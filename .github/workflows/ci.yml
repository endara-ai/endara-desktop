name: CI
on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Svelte check
        if: runner.os == 'Linux'
        run: npm run check
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0
      - name: Create dummy sidecar for check (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/endara-relay-${{ matrix.target }}
      - name: Create dummy sidecar for check (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          New-Item -ItemType File -Force -Path src-tauri/binaries/endara-relay-${{ matrix.target }}.exe
      - name: Rust check
        run: cd src-tauri && cargo check --target ${{ matrix.target }}

  pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf

